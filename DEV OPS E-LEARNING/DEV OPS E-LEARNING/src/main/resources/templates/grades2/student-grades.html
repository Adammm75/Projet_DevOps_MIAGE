<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::body})}">
<body>

<div class="row mb-4">
    <div class="col"><h2><i class="bi bi-graph-up me-2"></i>Mes Notes</h2></div>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card border-success">
            <div class="card-body text-center">
                <h6 class="text-muted">Moyenne générale</h6>
                <h2 class="text-success" th:text="${averageGrade != null ? #numbers.formatDecimal(averageGrade, 1, 2) : 'N/A'}">0.00</h2>
                <small>/20</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card">
            <div class="card-body text-center">
                <h6 class="text-muted">Total notes</h6>
                <h2 th:text="${totalNotes}">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-success">
            <div class="card-body text-center">
                <h6 class="text-muted">Cours validés</h6>
                <h2 class="text-success" th:text="${stats.passedCourses}">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-danger">
            <div class="card-body text-center">
                <h6 class="text-muted">Cours non validés</h6>
                <h2 class="text-danger" th:text="${stats.failedCourses}">0</h2>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header"><h5 class="mb-0">Notes par cours</h5></div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Cours</th>
                    <th>Note finale</th>
                    <th>Statut</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${notes == null || #lists.isEmpty(notes)}">
                    <td colspan="4" class="text-center py-4">Aucune note disponible</td>
                </tr>
                <tr th:each="note : ${notes}">
                    <td>
                        <span class="badge bg-secondary me-2" th:text="${note.cours?.code}">CODE</span>
                        <span th:text="${note.cours?.title}">Cours</span>
                    </td>
                    <td>
                            <span class="badge fs-6" th:classappend="${note.noteFinale.compareTo(T(java.math.BigDecimal).valueOf(10))} >= 0 ? 'bg-success' : 'bg-danger'">
                                <span th:text="${#numbers.formatDecimal(note.noteFinale, 1, 2)}">0.00</span>/20
                            </span>
                    </td>
                    <td>
                        <span th:if="${note.noteFinale.compareTo(T(java.math.BigDecimal).valueOf(10))} >= 0" class="badge bg-success">Validé</span>
                        <span th:if="${note.noteFinale.compareTo(T(java.math.BigDecimal).valueOf(10))} < 0" class="badge bg-danger">Non validé</span>
                    </td>
                    <td th:text="${#temporals.format(note.createdAt, 'dd/MM/yyyy')}">Date</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
