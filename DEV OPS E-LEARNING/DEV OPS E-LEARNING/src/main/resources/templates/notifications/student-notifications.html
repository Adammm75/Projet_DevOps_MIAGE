<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::body})}">
<body>

<div class="row mb-4">
    <div class="col"><h2><i class="bi bi-bell me-2"></i>Notifications <span class="badge bg-danger" th:if="${unreadCount > 0}" th:text="${unreadCount}">0</span></h2></div>
    <div class="col-auto">
        <form th:action="@{/student/notifications/mark-all-read}" method="post" style="display:inline">
            <button class="btn btn-outline-primary btn-sm" th:disabled="${unreadCount == 0}">
                <i class="bi bi-check-all"></i> Tout marquer comme lu
            </button>
        </form>
        <form th:action="@{/student/notifications/delete-all-read}" method="post" style="display:inline" onsubmit="return confirm('Supprimer toutes les notifications lues ?')">
            <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i> Supprimer les lues</button>
        </form>
    </div>
</div>

<ul class="nav nav-pills mb-4">
    <li class="nav-item"><a class="nav-link" th:classappend="${currentFilter == 'all'} ? 'active'" th:href="@{/student/notifications}">Toutes</a></li>
    <li class="nav-item"><a class="nav-link" th:classappend="${currentFilter == 'unread'} ? 'active'" th:href="@{/student/notifications(filter=unread)}">Non lues <span class="badge bg-danger" th:text="${unreadCount}">0</span></a></li>
    <li class="nav-item"><a class="nav-link" th:classappend="${currentFilter == 'read'} ? 'active'" th:href="@{/student/notifications(filter=read)}">Lues</a></li>
</ul>

<div th:if="${notifications == null || #lists.isEmpty(notifications)}" class="text-center py-5">
    <i class="bi bi-bell-slash" style="font-size: 3rem;"></i>
    <p class="text-muted mt-3">Aucune notification</p>
</div>

<div class="list-group">
    <div th:each="notif : ${notifications}" class="list-group-item list-group-item-action" th:classappend="${!notif.isRead} ? 'list-group-item-primary'">
        <div class="d-flex w-100 justify-content-between">
            <h6 class="mb-1" th:classappend="${!notif.isRead} ? 'fw-bold'">
                <i class="bi" th:classappend="${notif.type == 'ASSIGNMENT'} ? 'bi-file-earmark' : (${notif.type == 'GRADE'} ? 'bi-trophy' : 'bi-info-circle')"></i>
                <span th:text="${notif.title}">Titre</span>
            </h6>
            <small th:text="${#temporals.format(notif.createdAt, 'dd/MM HH:mm')}">Date</small>
        </div>
        <p class="mb-1" th:text="${notif.content}">Contenu</p>
        <div class="mt-2">
            <form th:if="${!notif.isRead}" th:action="@{/student/notifications/{id}/read(id=${notif.id})}" method="post" style="display:inline">
                <button class="btn btn-sm btn-outline-success"><i class="bi bi-check"></i> Marquer lu</button>
            </form>
            <form th:action="@{/student/notifications/{id}/delete(id=${notif.id})}" method="post" style="display:inline">
                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
