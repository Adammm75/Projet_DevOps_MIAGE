<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>

<!-- Breadcrumb -->
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a th:href="@{/student/courses}">Mes cours</a>
        </li>
        <li class="breadcrumb-item active" th:text="${course.code}">CODE</li>
    </ol>
</nav>

<!-- En-tête du cours -->
<div class="card mb-4 border-primary">
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                    <span class="badge bg-primary fs-5 me-3"
                          th:text="${course.code}">CODE</span>
                    <h3 class="mb-0"
                        th:text="${course.title}">Titre du cours</h3>
                </div>
                <p class="text-muted mb-0"
                   th:text="${course.description}">Description</p>
            </div>
            <div class="col-md-4 text-end">
                <div class="mb-2">
                    <i class="bi bi-person-circle me-2"></i>
                    <strong th:if="${course.createdBy != null}"
                            th:text="${course.createdBy.firstName + ' ' + course.createdBy.lastName}">
                        Enseignant
                    </strong>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Tabs -->
<ul class="nav nav-tabs mb-4" id="courseTabs" role="tablist">

    <!-- Ressources -->
    <li class="nav-item" role="presentation">
        <button class="nav-link active"
                data-bs-toggle="tab"
                data-bs-target="#resources"
                type="button">
            <i class="bi bi-folder me-2"></i>Ressources
        </button>
    </li>

    <!-- Résumé -->
    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="tab"
                data-bs-target="#summary"
                type="button">
            <i class="bi bi-file-text me-2"></i>Résumé
        </button>
    </li>

    <!-- Devoirs -->
    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="tab"
                data-bs-target="#assignments"
                type="button">
            <i class="bi bi-file-earmark-text me-2"></i>Devoirs
        </button>
    </li>

    <!-- QCM -->
    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="tab"
                data-bs-target="#qcm"
                type="button">
            <i class="bi bi-question-circle me-2"></i>QCM
        </button>
    </li>

    <!-- Notes -->
    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="tab"
                data-bs-target="#grades"
                type="button">
            <i class="bi bi-graph-up me-2"></i>Notes
        </button>
    </li>
</ul>

<!-- Contenu Tabs -->
<div class="tab-content">

    <!-- ================== RESSOURCES ================== -->
    <div class="tab-pane fade show active" id="resources">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="bi bi-folder-fill me-2"></i>Ressources pédagogiques
                </h5>
            </div>
            <div class="card-body">
                <div th:if="${resources == null || #lists.isEmpty(resources)}"
                     class="text-center py-5">
                    <p class="text-muted">Aucune ressource disponible</p>
                </div>

                <div th:each="r : ${resources}">
                    <a th:href="@{|/resources/${r.id}/open|}"
                       target="_blank"
                       class="d-block mb-2">
                        <strong th:text="${r.title}">Titre</strong>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ================== RÉSUMÉ ================== -->
    <div class="tab-pane fade" id="summary">
        <div class="card">
            <div class="card-header bg-secondary text-white d-flex justify-content-between">
                <h5 class="mb-0">
                    <i class="bi bi-file-text me-2"></i>Résumé du cours
                </h5>
                <button class="btn btn-light btn-sm"
                        onclick="downloadSummaryPDF()">
                    <i class="bi bi-download me-1"></i>Télécharger PDF
                </button>
            </div>
            <div class="card-body" id="courseSummaryContentStudent">
                <p class="text-muted">
                    Chargement du résumé...
                </p>
            </div>
        </div>
    </div>

    <!-- ================== DEVOIRS ================== -->
    <div class="tab-pane fade" id="assignments">
        <div class="card">
            <div class="card-body">
                <div th:if="${assignments == null || #lists.isEmpty(assignments)}"
                     class="text-center py-5">
                    <p class="text-muted">Aucun devoir à rendre</p>
                </div>

                <div th:each="a : ${assignments}">
                    <strong th:text="${a.title}">Titre devoir</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- ================== QCM ================== -->
    <div class="tab-pane fade" id="qcm">
        <div class="card">
            <div class="card-body">
                <div th:if="${qcms == null || #lists.isEmpty(qcms)}"
                     class="text-center py-5">
                    <p class="text-muted">Aucun QCM disponible</p>
                </div>

                <div th:each="q : ${qcms}">
                    <strong th:text="${q.titre}">Titre QCM</strong>
                </div>
            </div>
        </div>
    </div>

    <!-- ================== NOTES ================== -->
    <div class="tab-pane fade" id="grades">
        <div class="card">
            <div class="card-body text-center">
                <div th:if="${courseGrade != null}">
                    <div class="display-4 fw-bold"
                         th:text="${courseGrade} + '/20'">
                        15/20
                    </div>
                </div>
                <div th:if="${courseGrade == null}">
                    <div class="display-4 fw-bold text-muted">
                        --/20
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- ================== JS RÉSUMÉ ================== -->
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function () {

    const summaryContent = document.getElementById('courseSummaryContentStudent');
   const urlParts = window.location.pathname.split('/');
    const courseId = urlParts[urlParts.length - 1];


    fetch(`/api/v1/courses/${courseId}/summary`)
        .then(resp => resp.json())
        .then(data => {

            if (!data.summary || data.summary.trim() === "") {
                summaryContent.innerHTML =
                    "<p class='text-muted'>Aucun résumé disponible</p>";
                return;
            }

            const raw = data.summary;
            let html = "";

            const titleMatch = raw.match(/Titre\s*:\s*(.*)/i);
            if (titleMatch) {
                html += `<h5 class="fw-bold mb-3">${titleMatch[1].trim()}</h5>`;
            }

            let pointsPart = raw.split(/Points clés\s*:/i)[1];

            if (pointsPart) {
                const points = pointsPart
                    .split(/\d+\./)
                    .map(p => p.trim())
                    .filter(p => p.length > 0);

                html += "<ol>";
                points.forEach(p => {
                    html += `<li>${p}</li>`;
                });
                html += "</ol>";
            } else {
                html += `<p style="white-space: pre-line;">${raw}</p>`;
            }

            summaryContent.innerHTML = html;
        })
        .catch(() => {
            summaryContent.innerHTML =
                "<p class='text-danger'>Erreur lors du chargement du résumé</p>";
        });
});
</script>

<!-- ================== EXPORT PDF ================== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
function downloadSummaryPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const content = document.getElementById('courseSummaryContentStudent').innerText;
    const lines = doc.splitTextToSize(content, 180);
    doc.text(lines, 15, 20);
    doc.save("resume-cours.pdf");
}
</script>

</body>
</html>
