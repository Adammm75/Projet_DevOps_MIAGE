<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/courses}">Tous les cours</a></li>
                <li class="breadcrumb-item active">Modifier cours</li>
            </ol>
        </nav>
        <h2 class="mb-0">
            <i class="bi bi-pencil me-2"></i>Modifier le cours
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Informations du cours</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/courses/{id}/edit(id=${cours.id})}" method="post">
                    <div class="mb-3">
                        <label for="code" class="form-label">Code du cours *</label>
                        <input type="text"
                               class="form-control"
                               id="code"
                               name="code"
                               th:value="${cours.code}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Titre *</label>
                        <input type="text"
                               class="form-control"
                               id="title"
                               name="title"
                               th:value="${cours.title}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control"
                                  id="description"
                                  name="description"
                                  rows="5"
                                  th:text="${cours.description}"></textarea>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>
                        <strong>Enseignant responsable :</strong>
                        <span th:text="${cours.createdBy.firstName + ' ' + cours.createdBy.lastName}">Nom</span>
                        (ne peut pas être modifié)
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Enregistrer
                        </button>
                        <a th:href="@{/admin/courses}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-2"></i>Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h6 class="card-title">
                    <i class="bi bi-info-circle me-2"></i>Informations
                </h6>
                <ul class="mb-0">
                    <li>Le code doit rester unique</li>
                    <li>L'enseignant responsable ne peut pas être modifié</li>
                    <li>Les modifications sont enregistrées immédiatement</li>
                </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
