<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/users}">Utilisateurs</a></li>
                <li class="breadcrumb-item active" aria-current="page">Modifier</li>
            </ol>
        </nav>
        <h2 class="mb-0">
            <i class="bi bi-pencil me-2"></i>Modifier l'utilisateur
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Informations personnelles</h5>
            </div>
            <div class="card-body">
                <form th:action="@{|/admin/users/${user.id}/edit|}" method="post">
                    <div class="mb-3">
                        <label for="firstName" class="form-label">Prénom *</label>
                        <input type="text"
                               class="form-control"
                               id="firstName"
                               name="firstName"
                               th:value="${user.firstName}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label">Nom *</label>
                        <input type="text"
                               class="form-control"
                               id="lastName"
                               name="lastName"
                               th:value="${user.lastName}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               th:value="${user.email}"
                               required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Enregistrer
                        </button>
                        <a th:href="@{/admin/users}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-2"></i>Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h6 class="card-title">
                    <i class="bi bi-info-circle me-2"></i>Informations
                </h6>
                <ul class="mb-0">
                    <li>L'ID utilisateur ne peut pas être modifié</li>
                    <li>L'email doit être unique</li>
                    <li>Les rôles se gèrent séparément</li>
                </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
