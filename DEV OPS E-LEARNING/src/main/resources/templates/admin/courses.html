<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <h2 class="mb-0">
            <i class="bi bi-collection me-2"></i>Gestion des Cours
        </h2>
        <p class="text-muted mb-0">Tous les cours de la plateforme</p>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form th:action="@{/admin/courses}" method="get" class="row g-3">
            <div class="col-md-4">
                <input type="text"
                       class="form-control"
                       name="search"
                       th:value="${search}"
                       placeholder="Rechercher un cours...">
            </div>
            <div class="col-md-3">
                <select class="form-select" name="teacherId">
                    <option selected value="">Tous les enseignants</option>
                    <option th:each="t : ${teachers}"
                            th:value="${t.id}"
                            th:text="${t.firstName + ' ' + t.lastName}">
                        Enseignant
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="status">
                    <option selected>Tous les statuts</option>
                    <option value="active">Actifs</option>
                    <option value="archived">Archivés</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search me-2"></i>Rechercher
                </button>
            </div>
        </form>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card text-center border-primary">
            <div class="card-body">
                <i class="bi bi-book fs-2 text-primary"></i>
                <h6 class="mt-2 mb-0">Total Cours</h6>
                <h4 class="text-primary mb-0" th:text="${courses != null ? #lists.size(courses) : 0}">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-success">
            <div class="card-body">
                <i class="bi bi-check-circle fs-2 text-success"></i>
                <h6 class="mt-2 mb-0">Actifs</h6>
                <h4 class="text-success mb-0">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-info">
            <div class="card-body">
                <i class="bi bi-people fs-2 text-info"></i>
                <h6 class="mt-2 mb-0">Avec étudiants</h6>
                <h4 class="text-info mb-0">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-warning">
            <div class="card-body">
                <i class="bi bi-archive fs-2 text-warning"></i>
                <h6 class="mt-2 mb-0">Archivés</h6>
                <h4 class="text-warning mb-0">0</h4>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Liste des cours</h5>
        <div class="btn-group btn-group-sm">
            <!-- ✅ BOUTON EXPORT EXCEL UNIQUEMENT -->
            <a th:href="@{/admin/courses/export}" class="btn btn-outline-primary">
                <i class="bi bi-download me-1"></i>Exporter
            </a>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Titre</th>
                    <th>Enseignant</th>
                    <th>Créé le</th>
                    <th>Statut</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${courses == null || #lists.isEmpty(courses)}">
                    <td colspan="7" class="text-center py-5">
                        <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                        <h5 class="text-muted">Aucun cours enregistré</h5>
                    </td>
                </tr>

                <tr th:each="c : ${courses}">
                    <td>
                        <span class="badge bg-secondary" th:text="${c.id}">#1</span>
                    </td>
                    <td>
                        <span class="badge bg-primary" th:text="${c.code ?: 'N/A'}">CODE</span>
                    </td>
                    <td>
                        <strong th:text="${c.title ?: 'Sans titre'}">Titre du cours</strong>
                        <p class="mb-0 small text-muted" th:text="${c.description != null ? #strings.abbreviate(c.description, 60) : ''}">
                            Description
                        </p>
                    </td>
                    <td>
                        <div th:if="${c.createdBy != null}">
                            <strong th:text="${c.createdBy.firstName + ' ' + c.createdBy.lastName}">Nom</strong>
                            <br>
                            <small class="text-muted" th:text="${c.createdBy.email}">email@example.com</small>
                        </div>
                        <span th:if="${c.createdBy == null}" class="text-muted">N/A</span>
                    </td>
                    <td>
                        <small th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}">01/01/2024</small>
                    </td>
                    <td>
                        <span class="badge bg-success">Actif</span>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm">
                            <!-- ✅ BOUTON VOIR -->
                            <a th:href="@{/admin/courses/{id}(id=${c.id})}"
                               class="btn btn-outline-info"
                               title="Voir">
                                <i class="bi bi-eye"></i>
                            </a>

                            <!-- ✅ BOUTON MODIFIER -->
                            <a th:href="@{/admin/courses/{id}/edit(id=${c.id})}"
                               class="btn btn-outline-primary"
                               title="Modifier">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <!-- ✅ BOUTON SUPPRIMER -->
                            <form th:action="@{/admin/courses/{id}/delete(id=${c.id})}"
                                  method="post"
                                  style="display:inline;"
                                  onsubmit="return confirm('Êtes-vous sûr de vouloir supprimer ce cours ?');">
                                <button type="submit"
                                        class="btn btn-outline-danger btn-sm"
                                        title="Supprimer">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
