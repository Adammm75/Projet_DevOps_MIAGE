<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/structure}">Structure Pédagogique</a></li>
                <li class="breadcrumb-item active" aria-current="page">Modifier Parcours</li>
            </ol>
        </nav>
        <h2 class="mb-0">
            <i class="bi bi-pencil me-2"></i>Modifier le parcours
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Informations du parcours</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/structure/parcours/{id}/edit(id=${parcours.id})}" method="post">
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom du parcours *</label>
                        <input type="text"
                               class="form-control"
                               id="nom"
                               name="nom"
                               th:value="${parcours.nom}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="filiere" class="form-label">Filière *</label>
                        <select class="form-select"
                                id="filiere"
                                name="filiere.id"
                                required>
                            <option value="">-- Sélectionnez --</option>
                            <option th:each="f : ${filieres}"
                                    th:value="${f.id}"
                                    th:text="${f.nom}"
                                    th:selected="${parcours.filiere != null && parcours.filiere.id == f.id}">
                                Filière
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="niveau" class="form-label">Niveau d'études *</label>
                        <select class="form-select"
                                id="niveau"
                                name="niveau.id"
                                required>
                            <option value="">-- Sélectionnez --</option>
                            <option th:each="n : ${niveaux}"
                                    th:value="${n.id}"
                                    th:text="${n.libelle}"
                                    th:selected="${parcours.niveau != null && parcours.niveau.id == n.id}">
                                Niveau
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control"
                                  id="description"
                                  name="description"
                                  rows="3"
                                  th:text="${parcours.description}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Enregistrer
                        </button>
                        <a th:href="@{/admin/structure}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-2"></i>Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h6 class="card-title">
                    <i class="bi bi-info-circle me-2"></i>Informations
                </h6>
                <ul class="mb-0">
                    <li>L'ID du parcours ne peut pas être modifié</li>
                    <li>Le nom doit être unique</li>
                    <li>La filière et le niveau sont obligatoires</li>
                </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
