<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <h2 class="mb-0">
            <i class="bi bi-book me-2"></i>Mes Cours
        </h2>
        <p class="text-muted mb-0">Gérez vos cours et leurs ressources</p>
    </div>
    <div class="col-auto">
        <a th:href="@{/teacher/courses/new}" class="btn btn-success">
            <i class="bi bi-plus-circle me-2"></i>Nouveau cours
        </a>
    </div>
</div>

<!-- Liste des cours -->
<div class="row">
    <div th:if="${courses == null || #lists.isEmpty(courses)}" class="col-12">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">Aucun cours créé</h5>
                <p class="text-muted mb-3">Créez votre premier cours pour commencer</p>
                <a th:href="@{/teacher/courses/new}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-2"></i>Créer un cours
                </a>
            </div>
        </div>
    </div>

    <div th:each="c : ${courses}" th:if="${c != null}" class="col-lg-6 mb-4">
        <div class="card h-100 hover-shadow">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <span class="badge bg-primary fs-6" th:text="${c.code}">CODE</span>
                    <div class="btn-group btn-group-sm">
                        <a th:href="@{|/teacher/courses/${c.id}|}" class="btn btn-outline-primary" title="Voir">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:href="@{|/teacher/courses/${c.id}/edit|}" class="btn btn-outline-secondary" title="Modifier">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-outline-danger" title="Supprimer"
                                th:onclick="'if(confirm(\'Supprimer ce cours ?\')) { document.getElementById(\'delete-form-' + ${c.id} + '\').submit(); }'">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                    <form th:id="'delete-form-' + ${c.id}" th:action="@{|/teacher/courses/${c.id}/delete|}" method="post" style="display:none;">
                    </form>
                </div>

                <h5 class="card-title mb-3" th:text="${c.title}">Titre du cours</h5>

                <p class="card-text text-muted">
                    <span th:if="${c.description != null && !#strings.isEmpty(c.description)}"
                          th:text="${#strings.abbreviate(c.description, 150)}">
                        Description du cours...
                    </span>
                    <span th:if="${c.description == null || #strings.isEmpty(c.description)}"
                          class="fst-italic text-muted">
                        Aucune description
                    </span>
                </p>

                <hr>

                <div class="row text-center mb-3">
                    <div class="col-4">
                        <div class="text-muted small">Ressources</div>
                        <div class="fs-5 fw-bold text-info">0</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small">Devoirs</div>
                        <div class="fs-5 fw-bold text-primary">0</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small">Étudiants</div>
                        <div class="fs-5 fw-bold text-success">0</div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a th:href="@{|/teacher/courses/${c.id}|}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Gérer le cours
                    </a>
                </div>
            </div>

            <div class="card-footer bg-light">
                <small class="text-muted">
                    <i class="bi bi-calendar me-1"></i>
                    Créé le <span th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}">01/01/2024</span>
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    .hover-shadow {
        transition: all 0.3s ease;
    }
    .hover-shadow:hover {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        transform: translateY(-2px);
    }
</style>

</body>
</html>
