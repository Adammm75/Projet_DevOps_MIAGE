<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <h2 class="mb-0">
            <i class="bi bi-book me-2"></i>Mes Cours
        </h2>
        <p class="text-muted mb-0">Cours accessibles selon votre programme et classe</p>
    </div>
</div>

<!-- Filtres -->
<div class="card mb-4">
    <div class="card-body">
        <form class="row g-3">
            <div class="col-md-6">
                <input type="text" class="form-control" name="search" placeholder="Rechercher un cours...">
            </div>
            <div class="col-md-4">
                <select class="form-select" name="status">
                    <option value="" selected>Tous les cours</option>
                    <option value="ACTIVE">En cours</option>
                    <option value="COMPLETED">Terminés</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search me-2"></i>Rechercher
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Liste des cours -->
<div class="row">
    <div th:if="${courses == null || #lists.isEmpty(courses)}" class="col-12">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">Aucun cours disponible</h5>
                <p class="text-muted">Vous n'êtes inscrit à aucun cours pour le moment.</p>
            </div>
        </div>
    </div>

    <div th:each="c : ${courses}" class="col-lg-6 mb-4">
        <div class="card h-100 hover-shadow">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <span class="badge bg-primary fs-6" th:text="${c.code}">CODE</span>
                    <span class="badge bg-success">Actif</span>
                </div>

                <h5 class="card-title mb-3" th:text="${c.title}">Titre du cours</h5>

                <p class="card-text text-muted">
                    <span th:if="${c.description != null && !#strings.isEmpty(c.description)}"
                          th:text="${#strings.abbreviate(c.description, 150)}">
                        Description du cours...
                    </span>
                    <span th:if="${c.description == null || #strings.isEmpty(c.description)}"
                          class="fst-italic">
                        Aucune description disponible
                    </span>
                </p>

                <hr>

                <!-- ✅ CORRIGÉ - Utilise les collections directement -->
                <div class="row text-center mb-3">
                    <div class="col-4">
                        <div class="text-muted small">Devoirs</div>
                        <div class="fs-5 fw-bold">-</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small">QCM</div>
                        <div class="fs-5 fw-bold">-</div>
                    </div>
                    <div class="col-4">
                        <div class="text-muted small">Ressources</div>
                        <div class="fs-5 fw-bold">-</div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a th:href="@{|/student/courses/${c.id}|}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Accéder au cours
                    </a>
                </div>
            </div>

            <div class="card-footer bg-light">
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:if="${c.createdBy != null}"
                              th:text="${c.createdBy.firstName + ' ' + c.createdBy.lastName}">
                            Enseignant
                        </span>
                    </small>
                    <small class="text-muted">
                        <i class="bi bi-calendar me-1"></i>
                        <span th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}">01/01/2024</span>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .hover-shadow {
        transition: all 0.3s ease;
    }
    .hover-shadow:hover {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important;
        transform: translateY(-2px);
    }
</style>

</body>
</html>
