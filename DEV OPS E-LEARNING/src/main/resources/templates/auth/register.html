<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::body})">

<body>
<h2>Inscription étudiant</h2>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/register}" th:object="${registerForm}" method="post" class="mt-3 col-md-6">

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Prénom</label>
            <input th:field="*{firstName}" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Nom</label>
            <input th:field="*{lastName}" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" th:field="*{password}" class="form-control" required minlength="6">
        <small class="text-muted">Minimum 6 caractères</small>
    </div>

    <button type="submit" class="btn btn-success">Créer mon compte</button>
    <a th:href="@{/login}" class="btn btn-link">Déjà un compte ? Se connecter</a>
</form>
</body>
</html>
