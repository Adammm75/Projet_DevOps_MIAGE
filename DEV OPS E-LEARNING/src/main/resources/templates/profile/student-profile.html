<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::body})}">
<body>

<div class="row mb-4">
    <div class="col"><h2><i class="bi bi-person-circle me-2"></i>Mon Profil</h2></div>
</div>

<div th:if="${success}" class="alert alert-success"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>
<div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span></div>
<div th:if="${successPassword}" class="alert alert-success"><i class="bi bi-check-circle me-2"></i><span th:text="${successPassword}"></span></div>
<div th:if="${errorPassword}" class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorPassword}"></span></div>

<div class="row">
    <div class="col-lg-8">
        <!-- Informations personnelles -->
        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Informations personnelles</h5></div>
            <div class="card-body">
                <form th:action="@{/student/profile/update}" method="post" th:object="${profileForm}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prénom</label>
                            <input type="text" class="form-control" th:field="*{firstName}" th:value="${user.firstName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nom</label>
                            <input type="text" class="form-control" th:field="*{lastName}" th:value="${user.lastName}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:value="${user.email}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Téléphone</label>
                        <input type="tel" class="form-control" th:field="*{phone}" th:value="${user.phone}">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Enregistrer</button>
                </form>
            </div>
        </div>

        <!-- Changer mot de passe -->
        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Changer le mot de passe</h5></div>
            <div class="card-body">
                <form th:action="@{/student/profile/change-password}" method="post" th:object="${passwordForm}">
                    <div class="mb-3">
                        <label class="form-label">Mot de passe actuel</label>
                        <input type="password" class="form-control" th:field="*{currentPassword}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nouveau mot de passe</label>
                        <input type="password" class="form-control" th:field="*{newPassword}" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmer le nouveau mot de passe</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}" required>
                    </div>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-key"></i> Changer le mot de passe</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <div class="card">
            <div class="card-body text-center">
                <i class="bi bi-person-circle" style="font-size: 5rem;"></i>
                <h5 class="mt-3" th:text="${user.firstName + ' ' + user.lastName}">Nom</h5>
                <p class="text-muted" th:text="${user.email}">Email</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
