<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::body})}">
<body>

<div class="row mb-4">
    <div class="col">
        <h2 class="mb-0"><i class="bi bi-question-circle me-2"></i>Mes QCM</h2>
        <p class="text-muted mb-0">Liste des QCM disponibles</p>
    </div>
</div>

<div th:if="${qcms == null || #lists.isEmpty(qcms)}" class="text-center py-5">
    <i class="bi bi-inbox" style="font-size: 3rem;"></i>
    <p class="text-muted mt-3">Aucun QCM disponible pour le moment</p>
</div>

<div class="row">
    <div th:each="qcm : ${qcms}" class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <span class="badge bg-primary mb-2" th:text="${qcm.cours?.code}">COURS</span>
                <h5 th:text="${qcm.titre}">Titre QCM</h5>
                <p class="text-muted small" th:text="${qcm.description}">Description</p>

                <hr>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <small><i class="bi bi-clock"></i> Temps:
                        <span th:if="${qcm.limiteTempsMinutes != null}" th:text="${qcm.limiteTempsMinutes} + ' min'">30 min</span>
                        <span th:if="${qcm.limiteTempsMinutes == null}">Illimité</span>
                    </small>
                    <small><i class="bi bi-arrow-repeat"></i> Tentatives:
                        <span th:if="${qcm.tentativesMax != null}" th:text="${qcm.tentativesMax}">3</span>
                        <span th:if="${qcm.tentativesMax == null}">Illimitées</span>
                    </small>
                </div>

                <div th:with="userAttempts=${attempts.?[qcm.id == __${qcm.id}__]}">
                    <small class="text-muted">Tentatives effectuées: <span th:text="${#lists.size(userAttempts)}">0</span></small>

                    <div class="mt-3 d-grid gap-2">
                        <a th:href="@{/student/qcm/{id}/start(id=${qcm.id})}"
                           class="btn btn-primary"
                           th:if="${qcm.tentativesMax == null || #lists.size(userAttempts) < qcm.tentativesMax}">
                            <i class="bi bi-play-circle"></i> Commencer le QCM
                        </a>
                        <button class="btn btn-secondary" disabled
                                th:if="${qcm.tentativesMax != null && #lists.size(userAttempts) >= qcm.tentativesMax}">
                            Tentatives épuisées
                        </button>
                        <a th:href="@{/student/qcm/{id}/attempts(id=${qcm.id})}"
                           class="btn btn-outline-info btn-sm"
                           th:if="${!#lists.isEmpty(userAttempts)}">
                            <i class="bi bi-clock-history"></i> Voir l'historique
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
