<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::body})}">
<body>

<div class="row mb-4">
    <div class="col">
        <h2 th:text="${qcm.titre}">Titre QCM</h2>
        <p class="text-muted">Tentative en cours</p>
    </div>
    <div class="col-auto" th:if="${qcm.limiteTempsMinutes != null}">
        <div class="alert alert-warning mb-0">
            <i class="bi bi-clock"></i> Temps restant: <span id="timer">--:--</span>
        </div>
    </div>
</div>

<form th:action="@{/student/qcm/attempt/{id}/finish(id=${tentative.id})}" method="post" id="qcmForm">
    <div th:each="question, iterStat : ${questions}" class="card mb-4">
        <div class="card-header">
            <strong>Question <span th:text="${iterStat.index + 1}">1</span></strong>
            <span class="badge bg-info float-end" th:text="${question.points} + ' pts'">1 pts</span>
        </div>
        <div class="card-body">
            <p th:text="${question.texteQuestion}">Question</p>

            <div th:if="${question.typeQuestion == 'CHOIX_SIMPLE'}">
                <div th:each="option : ${question.options}" class="form-check mb-2">
                    <input class="form-check-input" type="radio"
                           th:name="'question_' + ${question.id}"
                           th:value="${option.id}"
                           th:id="'option_' + ${option.id}"
                           onchange="saveAnswer(this)">
                    <label class="form-check-label" th:for="'option_' + ${option.id}" th:text="${option.texteOption}">Option</label>
                </div>
            </div>

            <div th:if="${question.typeQuestion == 'CHOIX_MULTIPLE'}">
                <div th:each="option : ${question.options}" class="form-check mb-2">
                    <input class="form-check-input" type="checkbox"
                           th:name="'question_' + ${question.id}"
                           th:value="${option.id}"
                           th:id="'option_' + ${option.id}"
                           onchange="saveAnswer(this)">
                    <label class="form-check-label" th:for="'option_' + ${option.id}" th:text="${option.texteOption}">Option</label>
                </div>
            </div>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success btn-lg" onclick="return confirm('Êtes-vous sûr de vouloir terminer le QCM ?')">
            <i class="bi bi-check-circle"></i> Terminer le QCM
        </button>
    </div>
</form>

<script th:inline="javascript">
    let attemptId = /*[[${tentative.id}]]*/ 0;
    let timeLimit = /*[[${qcm.limiteTempsMinutes}]]*/ null;

    function saveAnswer(input) {
        let questionId = input.name.replace('question_', '');
        let optionId = input.value;

        fetch(`/student/qcm/attempt/${attemptId}/answer`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `questionId=${questionId}&optionId=${optionId}`
        });
    }

    if (timeLimit) {
        let startTime = new Date(/*[[${tentative.dateDebut}]]*/).getTime();
        let endTime = startTime + (timeLimit * 60 * 1000);

        let timerInterval = setInterval(() => {
            let now = new Date().getTime();
            let distance = endTime - now;

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById('qcmForm').submit();
            } else {
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById('timer').innerHTML = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            }
        }, 1000);
    }
</script>

</body>
</html>
