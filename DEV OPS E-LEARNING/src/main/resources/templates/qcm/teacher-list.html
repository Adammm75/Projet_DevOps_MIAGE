<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<div class="row mb-4">
    <div class="col">
        <h2 class="mb-0">
            <i class="bi bi-question-circle me-2"></i>Mes QCM
        </h2>
        <p class="text-muted mb-0">Créez et gérez vos quiz</p>
    </div>
    <div class="col-auto">
        <a th:href="@{/teacher/qcm/new}" class="btn btn-success">
            <i class="bi bi-plus-circle me-2"></i>Nouveau QCM
        </a>
    </div>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form class="row g-3">
            <div class="col-md-5">
                <select class="form-select" name="courseId">
                    <option selected value="">Tous les cours</option>
                    <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.code + ' - ' + c.title}">Cours</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="status">
                    <option selected>Tous</option>
                    <option value="published">Publiés</option>
                    <option value="draft">Brouillons</option>
                </select>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-funnel me-2"></i>Filtrer
                </button>
            </div>
        </form>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card text-center border-primary">
            <div class="card-body">
                <i class="bi bi-question-circle fs-2 text-primary"></i>
                <h6 class="mt-2 mb-0">Total QCM</h6>
                <h4 class="text-primary mb-0" th:text="${qcms != null ? #lists.size(qcms) : 0}">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-success">
            <div class="card-body">
                <i class="bi bi-check-circle fs-2 text-success"></i>
                <h6 class="mt-2 mb-0">Publiés</h6>
                <h4 class="text-success mb-0" th:text="${qcms != null ? #lists.size(qcms.?[publie]) : 0}">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-warning">
            <div class="card-body">
                <i class="bi bi-file-earmark fs-2 text-warning"></i>
                <h6 class="mt-2 mb-0">Brouillons</h6>
                <h4 class="text-warning mb-0" th:text="${qcms != null ? #lists.size(qcms.?[!publie]) : 0}">0</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center border-info">
            <div class="card-body">
                <i class="bi bi-people fs-2 text-info"></i>
                <h6 class="mt-2 mb-0">Tentatives</h6>
                <h4 class="text-info mb-0">0</h4>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Liste des QCM</h5>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Cours</th>
                    <th>Titre</th>
                    <th>Questions</th>
                    <th>Temps limite</th>
                    <th>Tentatives</th>
                    <th>Statut</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${qcms == null || #lists.isEmpty(qcms)}">
                    <td colspan="7" class="text-center py-5">
                        <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                        <h5 class="text-muted">Aucun QCM créé</h5>
                        <a th:href="@{/teacher/qcm/new}" class="btn btn-success mt-2">
                            <i class="bi bi-plus-circle me-2"></i>Créer mon premier QCM
                        </a>
                    </td>
                </tr>

                <tr th:each="q : ${qcms}">
                    <td>
                        <span class="badge bg-secondary" th:text="${q.cours?.code}">CODE</span>
                    </td>
                    <td>
                        <strong th:text="${q.titre}">Titre du QCM</strong>
                        <p class="mb-0 small text-muted" th:text="${#strings.abbreviate(q.description ?: '', 60)}">Description</p>
                    </td>
                    <td>
                        <span class="badge bg-info">0 questions</span>
                    </td>
                    <td>
                            <span th:if="${q.limiteTempsMinutes != null}">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${q.limiteTempsMinutes}">30</span> min
                            </span>
                        <span th:if="${q.limiteTempsMinutes == null}" class="text-muted">
                                <i class="bi bi-infinity"></i> Illimité
                            </span>
                    </td>
                    <td>
                        <span th:if="${q.tentativesMax != null}" th:text="${q.tentativesMax}">3</span>
                        <span th:if="${q.tentativesMax == null}">∞</span>
                    </td>
                    <td>
                            <span class="badge" th:classappend="${q.publie} ? 'bg-success' : 'bg-warning'">
                                <i class="bi" th:classappend="${q.publie} ? 'bi-check-circle' : 'bi-file-earmark'"></i>
                                <span th:text="${q.publie} ? 'Publié' : 'Brouillon'">Statut</span>
                            </span>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm">
                            <a th:href="@{|/teacher/qcm/${q.id}/results|}" class="btn btn-outline-info" title="Résultats">
                                <i class="bi bi-graph-up"></i>
                            </a>
                            <a th:href="@{|/teacher/qcm/${q.id}/edit|}" class="btn btn-outline-primary" title="Modifier">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-outline-warning" title="Publier/Dépublier">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button type="button" class="btn btn-outline-danger" title="Supprimer" onclick="if(confirm('Supprimer ce QCM ?')) {}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
