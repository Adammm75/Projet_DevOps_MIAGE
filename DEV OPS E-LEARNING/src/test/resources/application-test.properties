# Crée les tables au démarrage des tests, supprime à la fin
spring.jpa.hibernate.ddl-auto=create-drop

# Force la connexion au MySQL du docker compose (CI)
spring.datasource.url=jdbc:mysql://localhost:3307/elearning?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# debug utile
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
