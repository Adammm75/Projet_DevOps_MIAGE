# Force Hibernate à créer les tables pour les tests
spring.jpa.hibernate.ddl-auto=create-drop

# (optionnel mais utile)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Assure que tu utilises bien MySQL (pas H2)
spring.datasource.url=jdbc:mysql://localhost:3307/elearning?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
