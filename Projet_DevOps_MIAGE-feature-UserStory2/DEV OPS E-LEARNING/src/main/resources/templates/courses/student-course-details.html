<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::body})}">

<body>
<!-- Breadcrumb -->
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/student/courses}">Mes cours</a></li>
        <li class="breadcrumb-item active" th:text="${course.code}">CODE</li>
    </ol>
</nav>

<!-- En-tête du cours -->
<div class="card mb-4 border-primary">
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                    <span class="badge bg-primary fs-5 me-3" th:text="${course.code}">CODE</span>
                    <h3 class="mb-0" th:text="${course.title}">Titre du cours</h3>
                </div>
                <p class="text-muted mb-0" th:text="${course.description}">Description du cours</p>
            </div>
            <div class="col-md-4 text-end">
                <div class="mb-2">
                    <i class="bi bi-person-circle me-2"></i>
                    <strong th:if="${course.createdBy != null}"
                            th:text="${course.createdBy.firstName + ' ' + course.createdBy.lastName}">
                        Enseignant
                    </strong>
                </div>
                <a th:href="@{/messages/compose(recipientId=${course.createdBy?.id})}" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-envelope me-2"></i>Contacter l'enseignant
                </a>
            </div>
        </div>
    </div>
</div>

<!-- -------------------- Résumé du cours -------------------- -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-file-text me-2"></i>Résumé du cours
                </h5>
                <button class="btn btn-light btn-sm" onclick="downloadSummaryPDF()">
                    <i class="bi bi-download me-1"></i>Télécharger PDF
                </button>
            </div>
            <div class="card-body" id="courseSummaryContent">
                <p class="text-muted">
                    <i class="bi bi-info-circle me-2"></i>Chargement du résumé...
                </p>
            </div>
        </div>
    </div>
</div>

<!-- Tabs de navigation -->
<ul class="nav nav-tabs mb-4" id="courseTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="resources-tab" data-bs-toggle="tab"
                data-bs-target="#resources" type="button" role="tab">
            <i class="bi bi-folder me-2"></i>Ressources
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="assignments-tab" data-bs-toggle="tab"
                data-bs-target="#assignments" type="button" role="tab">
            <i class="bi bi-file-earmark-text me-2"></i>Devoirs
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="qcm-tab" data-bs-toggle="tab"
                data-bs-target="#qcm" type="button" role="tab">
            <i class="bi bi-question-circle me-2"></i>QCM
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="grades-tab" data-bs-toggle="tab"
                data-bs-target="#grades" type="button" role="tab">
            <i class="bi bi-graph-up me-2"></i>Notes
        </button>
    </li>
</ul>

<!-- Contenu des tabs -->
<div class="tab-content" id="courseTabContent">

    <!-- RESSOURCES -->
    <div class="tab-pane fade show active" id="resources" role="tabpanel">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-folder-fill me-2"></i>Ressources pédagogiques</h5>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush">
                    <div th:if="${resources == null || #lists.isEmpty(resources)}"
                         class="list-group-item text-center py-5">
                        <i class="bi bi-inbox fs-1 text-muted d-block mb-2"></i>
                        <p class="text-muted mb-0">Aucune ressource disponible</p>
                    </div>

                    <a th:each="r : ${resources}"
                       th:href="@{|/resources/${r.id}/open|}"
                       class="list-group-item list-group-item-action"
                       target="_blank">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <i class="bi fs-3 me-3"
                                   th:classappend="${r.type == 'PDF'} ? 'bi-file-pdf text-danger' :
                                                   ${r.type == 'WORD'} ? 'bi-file-word text-primary' :
                                                   ${r.type == 'PPT'} ? 'bi-file-ppt text-warning' :
                                                   'bi-file-earmark text-secondary'"></i>
                                <div>
                                    <h6 class="mb-0" th:text="${r.title}">Titre de la ressource</h6>
                                    <small class="text-muted" th:text="${r.description}">Description</small>
                                </div>
                            </div>
                            <div class="text-end">
                                <span class="badge bg-secondary" th:text="${r.type}">TYPE</span>
                                <div class="small text-muted mt-1">
                                    <i class="bi bi-calendar me-1"></i>
                                    <span th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy')}">01/01/2024</span>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- DEVOIRS -->
    <div class="tab-pane fade" id="assignments" role="tabpanel">
        <!-- Même contenu que ton template original -->
    </div>

    <!-- QCM -->
    <div class="tab-pane fade" id="qcm" role="tabpanel">
        <!-- Même contenu que ton template original -->
    </div>

    <!-- NOTES -->
    <div class="tab-pane fade" id="grades" role="tabpanel">
        <!-- Même contenu que ton template original -->
    </div>
</div>

<!-- JS résumé (Option B) -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    const summaryContent = document.getElementById('courseSummaryContent');
    const urlParts = window.location.pathname.split('/');
    const courseId = urlParts[urlParts.length - 1];

    fetch(`/api/v1/student/courses/${courseId}/summary`)
        .then(resp => resp.json())
        .then(data => {
            if (!data.summary || data.summary.trim() === "") {
                summaryContent.innerHTML = `
                    <p class="text-muted">
                        <i class="bi bi-info-circle me-2"></i>Aucun résumé disponible
                    </p>`;
                return;
            }

            // Affichage simple : titre + résumé
            let html = "";
            if(data.title && data.title.trim() !== "") html += `<h5 class="fw-bold mb-3">${data.title}</h5>`;
            html += `<p style="white-space: pre-line;">${data.summary}</p>`;

            summaryContent.innerHTML = html;
        })
        .catch(err => console.error('Erreur récupération résumé :', err));
});

function downloadSummaryPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const content = document.getElementById('courseSummaryContent').innerText;
    const lines = doc.splitTextToSize(content, 180);
    doc.text(lines, 15, 20);
    doc.save("resume-cours.pdf");
}
</script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
