version: '3.9'

services:
  mysql:
    image: mysql:8.1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: e-learning
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - elearning-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mysql
    networks:
      - elearning-net

  backend:
    build: .
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - elearning-net

volumes:
  dbdata:

networks:
  elearning-net:
    driver: bridge
