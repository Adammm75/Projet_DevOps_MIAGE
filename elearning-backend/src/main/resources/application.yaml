server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/e-learning?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Optional (mais utile)
logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

